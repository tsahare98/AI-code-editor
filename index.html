<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Code Pulse | AI Reviewer</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #05070a;
            --glass: rgba(15, 23, 42, 0.8);
            --primary: #00f2ff; /* Cyan Neon */
            --secondary: #7000ff; /* Purple Neon */
            --accent: #00ff88; /* Green Neon */
            --text: #e2e8f0;
            --border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 242, 255, 0.1) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- Header --- */
        .header {
            margin-top: 40px;
            text-align: center;
        }

        .title {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -1px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.4));
        }

        /* --- Main Layout --- */
        .main-container {
            width: 95%;
            max-width: 1300px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-top: 40px;
            padding-bottom: 50px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }

        /* --- Toolbar --- */
        .toolbar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        select {
            background: #0f172a;
            color: var(--primary);
            border: 1px solid var(--border);
            padding: 8px 15px;
            border-radius: 8px;
            outline: none;
            font-weight: 600;
        }

        button {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.5);
        }

        /* --- Editors & Pre --- */
        textarea {
            width: 100%;
            height: 500px;
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 20px;
            color: var(--accent);
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            resize: none;
            outline: none;
        }

        .results-area {
            height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #64748b;
            margin-top: 20px;
            margin-bottom: 8px;
            display: block;
            letter-spacing: 1px;
            font-weight: 800;
        }

        pre {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            border-left: 3px solid var(--primary);
            white-space: pre-wrap;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
            color: #cbd5e1;
        }

        /* --- Scanning Animation --- */
        .scanner {
            width: 100%;
            height: 2px;
            background: var(--primary);
            position: relative;
            box-shadow: 0 0 15px var(--primary);
            display: none;
            margin-bottom: 10px;
            animation: scanMove 2s infinite ease-in-out;
        }

        @keyframes scanMove {
            0% { transform: scaleX(0); opacity: 0; }
            50% { transform: scaleX(1); opacity: 1; }
            100% { transform: scaleX(0); opacity: 0; }
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">CORE_EXTRACT.AI</div>
        <p style="color: #64748b;">Neural Code Vulnerability & Efficiency Scanner</p>
    </div>

    <div class="main-container">
        <div class="card">
            <div class="toolbar">
                <select id="language">
                    <option value="python">Python</option>
                    <option value="javascript">JavaScript</option>
                    <option value="java">Java</option>
                </select>
                <button onclick="analyzeCode()">Execute Scan</button>
            </div>
            <textarea id="codeInput" placeholder="// Paste your source code here..."></textarea>
        </div>

        <div class="card">
            <div id="scanner" class="scanner"></div>
            <div class="results-area">
                <span class="section-label">AI Review Insight</span>
                <pre id="aiResult" style="color: var(--primary);">System Ready...</pre>

                <span class="section-label">Security Scan</span>
                <pre id="securityResult" style="border-color: #ef4444; color: #f87171;">No threats detected.</pre>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div>
                        <span class="section-label">Complexity</span>
                        <pre id="complexityResult" style="border-color: var(--accent);">--</pre>
                    </div>
                    <div>
                        <span class="section-label">Static Score</span>
                        <pre id="staticResult">--</pre>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function typeEffect(element, text) {
            element.textContent = "";
            let i = 0;
            if (element.interval) clearInterval(element.interval);
            element.interval = setInterval(() => {
                if (i < text.length) {
                    element.textContent += text.charAt(i);
                    i++;
                } else {
                    clearInterval(element.interval);
                }
            }, 10);
        }

        async function analyzeCode() {
            const code = document.getElementById("codeInput").value;
            const language = document.getElementById("language").value;
            const scanner = document.getElementById("scanner");
            const aiBox = document.getElementById("aiResult");

            if (!code.trim()) {
                alert("Please provide source code.");
                return;
            }

            scanner.style.display = "block";
            aiBox.textContent = "Decrypting code patterns...";

            try {
                const response = await fetch("/analyze", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ code, language })
                });

                console.log("Raw Response: before", response);
                const data = await response.json();
                console.log("Raw Response: after ", response);
                const res = data.analysis;

                scanner.style.display = "none";

                // Visual updates
                typeEffect(aiBox, res.ai_analysis);
                document.getElementById("staticResult").textContent = JSON.stringify(res.static_analysis, null, 2);
                document.getElementById("securityResult").textContent = Array.isArray(res.security_analysis) ? res.security_analysis.join("\n") : "Clean";
                document.getElementById("complexityResult").textContent = res.complexity;

            } catch (err) {
                scanner.style.display = "none";
                aiBox.textContent = "FATAL ERROR: Connection to AI core severed.";
            }
        }
    </script>
</body>
</html>
